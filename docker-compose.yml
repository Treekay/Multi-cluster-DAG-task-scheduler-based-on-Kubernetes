services:
  dag-scheduler-ui:
    build:
      context: .
    image: multi-cluster-dag-scheduler:local
    ports:
      - "8080:8080"
    environment:
      KUBECONFIG: /kube/config
    volumes:
      - ${KUBECONFIG_DIR:-${USERPROFILE}/.kube}:/kube:ro
      - ./config:/app/config:ro
    command:
      - sh
      - -c
      - |
        if [ -f config/clusters.json ]; then
          exec dagserver -addr 0.0.0.0:8080 -workflow examples/workflow.json -workflows examples/workflows -clusters config/clusters.json -web web
        fi
        exec dagserver -addr 0.0.0.0:8080 -workflow examples/workflow.json -workflows examples/workflows -clusters examples/clusters.example.json -web web
    restart: unless-stopped
